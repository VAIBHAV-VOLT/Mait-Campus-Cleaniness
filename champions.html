<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>MAIT Clean Campus Champions</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap"
        rel="stylesheet">
    <style>
        :root {
            --text: #163020;
            --muted: #5c7a67;
            --green: #2e7d32;
            --green-2: #4caf50;
            --shadow: 0 20px 40px rgba(22, 48, 32, .12);
            --radius: 24px
        }

        * {
            box-sizing: border-box
        }

        body {
            margin: 0;
            font-family: 'Poppins', sans-serif;
            color: var(--text);
            background: radial-gradient(circle at top left, rgba(76, 175, 80, .18), transparent 25%), radial-gradient(circle at top right, rgba(249, 168, 38, .15), transparent 22%), linear-gradient(135deg, #f7fff7, #eefcf0 45%, #f9fff5);
            line-height: 1.7
        }

        .container {
            width: min(1180px, 92%);
            margin: 0 auto;
            padding: 40px 0 70px
        }

        .topbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 16px;
            margin-bottom: 30px
        }

        .title h1 {
            margin: 0;
            font-size: clamp(2rem, 4vw, 3.3rem);
            color: var(--green)
        }

        .title p {
            color: var(--muted);
            max-width: 750px;
            margin-top: 8px
        }

        .back-btn {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            padding: 14px 20px;
            border-radius: 999px;
            text-decoration: none;
            font-weight: 700;
            background: linear-gradient(135deg, var(--green), var(--green-2));
            color: #fff
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 24px;
            margin-top: 30px
        }

        .card {
            background: rgba(255, 255, 255, .82);
            border-radius: var(--radius);
            padding: 24px;
            text-align: center;
            box-shadow: var(--shadow);
            border: 1px solid rgba(255, 255, 255, .7);
            backdrop-filter: blur(14px);
            position: relative;
            overflow: hidden
        }

        .badge {
            position: absolute;
            top: 16px;
            right: 16px;
            background: #eef8f0;
            color: var(--green);
            padding: 8px 12px;
            border-radius: 999px;
            font-size: .8rem;
            font-weight: 700
        }

        .avatar {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            overflow: hidden;
            margin: 10px auto 16px;
            border: 5px solid #e4f4e6
        }

        .avatar img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block
        }

        h2 {
            margin: 8px 0 6px;
            font-size: 1.3rem
        }

        .role {
            color: var(--green);
            font-weight: 700;
            font-size: .95rem;
            margin-bottom: 12px
        }

        .desc {
            color: var(--muted);
            font-size: .96rem;
            min-height: 100px
        }

        .linkedin-btn {
            display: inline-block;
            margin-top: 14px;
            padding: 11px 18px;
            border-radius: 999px;
            background: #0a66c2;
            color: #fff;
            text-decoration: none;
            font-weight: 700;
            font-size: .92rem
        }

        @media(max-width:980px) {
            .grid {
                grid-template-columns: repeat(2, 1fr)
            }
        }

        @media(max-width:640px) {
            .grid {
                grid-template-columns: 1fr
            }
        }
    </style>
</head>

<body>
    <div class="container">
        <div class="topbar">
            <div class="title">
                <h1>⭐ MAIT Clean Campus Champions</h1>
                <p>A featured showcase of students whose responses, habits, insights, and suggestions added meaningful
                    value to the MAIT Clean Campus Awareness Study 2026.</p>
            </div><a class="back-btn" href="index.html">← Back to Main Website</a>
        </div>
        <div id="championsGrid" class="grid"></div>
    </div>
    <script src="data/champions.js"></script>
    <script>const grid = document.getElementById('championsGrid'); const tags = ['Featured Voice', 'Cleanliness Advocate', 'Campus Observer', 'Student Insight', 'Clean Campus Voice', 'Awareness Contributor']; grid.innerHTML = championsData.filter(p => p.show).map((p, i) => `<div class="card"><div class="badge">${tags[i % tags.length]}</div><div class="avatar"><img src="${p.image}" alt="${p.name}" onerror="this.src='images/champions/default.jpg'"></div><h2>${p.name}</h2><div class="role">${p.highlight}</div><p class="desc">${p.quote}</p><a class="linkedin-btn" href="${p.linkedin}" target="_blank">Connect on LinkedIn</a></div>`).join('');</script>
</body>

</html>
